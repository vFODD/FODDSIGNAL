        <script>
            function calcStats(trades) {
                const n = trades.length;
                if (n === 0) return null;
                let win = 0,
                    rrSum = 0,
                    rrCount = 0,
                    returns = [],
                    equity = [],
                    maxDD = 0;
                let monthReturns = {},
                    weekReturns = {};
                let lastEquity = null;
                let firstDate = null,
                    lastDate = null,
                    totalReturn = 0;
                trades.forEach((t, idx) => {
                    const ret = parseFloat(t.result.replace("%", "")) / 100;
                    returns.push(ret);
                    totalReturn += ret;
                    // Tarihleri bul
                    let dateStr = t.time.split(" ")[0].replace(/\./g, "-");
                    let dateObj = new Date(
                        "20" + dateStr.split("-").reverse().join("-"),
                    );
                    if (!isNaN(dateObj)) {
                        if (!firstDate || dateObj < firstDate)
                            firstDate = dateObj;
                        if (!lastDate || dateObj > lastDate) lastDate = dateObj;
                    }
                    if (t.reason === "TP") win++;
                    if (t.sl && t.tp && t.entry) {
                        let entry = parseFloat(t.entry),
                            sl = parseFloat(t.sl),
                            tp = parseFloat(t.tp);
                        if (entry && sl && tp) {
                            let rr = Math.abs((tp - entry) / (entry - sl));
                            if (isFinite(rr) && rr > 0) {
                                rrSum += rr;
                                rrCount++;
                            }
                        }
                    }
                    // Equity
                    let eq = parseFloat(t.equity);
                    if (!isNaN(eq)) equity.push(eq);
                    // Monthly/Weekly
                    let date = t.time.split(" ")[0].replace(/\./g, "-");
                    let dateObj2 = new Date(
                        "20" + date.split("-").reverse().join("-"),
                    );
                    let ym =
                        dateObj2.getFullYear() +
                        "-" +
                        (dateObj2.getMonth() + 1);
                    let yw =
                        dateObj2.getFullYear() + "-W" + getWeekNumber(dateObj2);
                    monthReturns[ym] = (monthReturns[ym] || 0) + ret;
                    weekReturns[yw] = (weekReturns[yw] || 0) + ret;
                });
                // Max Drawdown (her noktadan sonraki minimuma oranla en büyük düşüş)
                if (equity.length > 0) {
                    let peak = equity[0];
                    for (let i = 1; i < equity.length; i++) {
                        if (equity[i] > peak) peak = equity[i];
                        let dd = (peak - equity[i]) / peak;
                        if (dd > maxDD) maxDD = dd;
                    }
                }
                // Sharpe
                let mean = returns.reduce((a, b) => a + b, 0) / n;
                let std = Math.sqrt(
                    returns.reduce((a, b) => a + (b - mean) ** 2, 0) / n,
                );
                let sharpe = std
                    ? ((mean / std) * Math.sqrt(252)).toFixed(2)
                    : "—";
                // Win rate
                let winRate = ((win / n) * 100).toFixed(1) + "%";
                // Avg R:R
                let avgRR = rrCount ? (rrSum / rrCount).toFixed(2) : "—";
                // Max DD
                let maxDraw = maxDD ? (maxDD * 100).toFixed(2) + "%" : "—";
                // Monthly/Weekly net return (son ay/hafta)
                let lastMonth = Object.keys(monthReturns).sort().pop();
                let lastWeek = Object.keys(weekReturns).sort().pop();
                let monthNet = lastMonth
                    ? (monthReturns[lastMonth] * 100).toFixed(2) + "%"
                    : "—";
                let weekNet = lastWeek
                    ? (weekReturns[lastWeek] * 100).toFixed(2) + "%"
                    : "—";
                // Toplam getiri ve gün sayısı
                let totalReturnPct = (totalReturn * 100).toFixed(2) + "%";
                let dayCount =
                    firstDate && lastDate
                        ? Math.round((lastDate - firstDate) / 86400000) + 1
                        : null;
                return {
                    sharpe,
                    winRate,
                    avgRR,
                    maxDraw,
                    monthNet,
                    weekNet,
                    n,
                    totalReturn: totalReturnPct,
                    dayCount,
                };
            }
            function getWeekNumber(d) {
                d = new Date(
                    Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()),
                );
                let dayNum = d.getUTCDay() || 7;
                d.setUTCDate(d.getUTCDate() + 4 - dayNum);
                let yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
                return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
            }
            function renderStatsBar(stats) {
                const bar = document.getElementById("stats-bar");
                if (!stats) {
                    bar.innerHTML = "";
                    return;
                }
                const lang = (
                    navigator.language ||
                    navigator.userLanguage ||
                    ""
                ).toLowerCase();
                const isTR = lang.startsWith("tr");
                const labels = isTR
                    ? {
                          sharpe: "Sharpe Ratio: Riske göre düzeltilmiş getiri oranı. Daha yüksek değer, daha iyi risk-ayarlı performans.",
                          win: "Win Rate: Kazanılan işlemlerin yüzdesi. Yüksek oran, daha fazla başarılı işlem demektir.",
                          rr: "Avg R:R: Ortalama Risk/Ödül oranı. 1'den büyükse, kazançlar kayıplardan daha büyüktür.",
                          dd: "Max Drawdown: En büyük sermaye düşüşü. Düşük olması daha iyidir.",
                          week: "Weekly Return: Son haftanın toplam net getirisi.",
                          month: "Monthly Return: Son ayın toplam net getirisi.",
                          n: "# of Trades: Toplam işlem sayısı.",
                      }
                    : {
                          sharpe: "Sharpe Ratio: Risk-adjusted return. Higher is better.",
                          win: "Win Rate: Percentage of winning trades. Higher means more successful trades.",
                          rr: "Avg R:R: Average Risk/Reward ratio. Above 1 means gains are larger than losses.",
                          dd: "Max Drawdown: Largest equity drop. Lower is better.",
                          week: "Weekly Return: Net return for the last week.",
                          month: "Monthly Return: Net return for the last month.",
                          n: "# of Trades: Total number of trades.",
                      };
                bar.innerHTML = `
        <div class="stat-box" data-info="${labels.sharpe}"><div class="stat-label">Sharpe Ratio</div><div class="stat-value stat-sharpe">${stats.sharpe}</div></div>
        <div class="stat-box" data-info="${labels.win}"><div class="stat-label">Win Rate</div><div class="stat-value stat-win">${stats.winRate}</div></div>
        <div class="stat-box" data-info="${labels.rr}"><div class="stat-label">Avg R:R</div><div class="stat-value stat-rr">${stats.avgRR}</div></div>
        <div class="stat-box" data-info="${labels.dd}"><div class="stat-label">Max Drawdown</div><div class="stat-value stat-dd">${stats.maxDraw}</div></div>
        <div class="stat-box" data-info="${labels.week}"><div class="stat-label">Weekly Return</div><div class="stat-value stat-week">${stats.weekNet}</div></div>
        <div class="stat-box" data-info="${labels.month}"><div class="stat-label">Monthly Return</div><div class="stat-value stat-month">${stats.monthNet}</div></div>
        <div class="stat-box" data-info="${labels.n}"><div class="stat-label"># of Trades</div><div class="stat-value stat-n">${stats.n}</div></div>
      `;
            }
            function parseTrades(data) {
                return data
                    .trim()
                    .replace(/\r\n/g, "\n")
                    .replace(/\r/g, "\n")
                    .split("\n")
                    .filter((row) => row.trim())
                    .map((row) => {
                        const match = row.match(
                            /^\[(.+?)\] (.+?) (SHORT|LONG) - Entry: (.+?), SL: (.+?), TP: (.+?), Exit: (.+?), Reason: (.+?), Result: (.+?), Equity: (.+?)$/,
                        );
                        if (match) {
                            const [
                                ,
                                time,
                                coin,
                                direction,
                                entry,
                                sl,
                                tp,
                                exit,
                                reason,
                                result,
                                equity,
                            ] = match;
                            return {
                                time,
                                coin,
                                direction,
                                entry,
                                sl,
                                tp,
                                exit,
                                reason,
                                result,
                                equity,
                            };
                        }
                        return null;
                    })
                    .filter(Boolean);
            }

            function loadTradesGeneric(
                csv,
                statsBarId,
                tableId,
                totalReturnBarId,
            ) {
                fetch(csv, { cache: "no-cache" })
                    .then((r) => r.text())
                    .then((data) => {
                        const trades = parseTrades(data);
                        const stats = calcStats(trades);
                        renderStatsBarTo(stats, statsBarId);
                        // Toplam getiri stat-box'u (always English)
                        if (totalReturnBarId && stats) {
                            const bar =
                                document.getElementById(totalReturnBarId);
                            const lang = (
                                navigator.language ||
                                navigator.userLanguage ||
                                ""
                            ).toLowerCase();
                            const isTR = lang.startsWith("tr");
                            let label, info;
                            // Always show English label on button, but keep info localized
                            label = stats.dayCount
                                ? `Total Return (${stats.dayCount} days)`
                                : "Total Return";
                            if (isTR) {
                                info =
                                    "Toplam Getiri: Tüm işlemlerden elde edilen net yüzde getiri. Parantez içindeki sayı, bu getirinin kaç günde elde edildiğini gösterir.";
                            } else {
                                info =
                                    "Total Return: Net percentage return from all trades. The number in parentheses shows over how many days this return was achieved.";
                            }
                            // Total return değerini parse et ve rengini belirle
                            const returnValue = parseFloat(
                                stats.totalReturn.replace("%", ""),
                            );
                            const valueColorClass =
                                returnValue >= 0
                                    ? "stat-total-positive"
                                    : "stat-total-negative";

                            bar.innerHTML = `
              <div class="stat-box stat-total stat-total-single" style="
              transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow, transform;
              transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
              transition-duration: 300ms;
              " data-info="${info}">
                <span class="stat-total-label">${label}:</span>
                <span class="stat-total-value ${valueColorClass}">${stats.totalReturn}</span>
              </div>
            `;
                        }
                        const tbody = document.querySelector(
                            `#${tableId} tbody`,
                        );
                        tbody.innerHTML = "";
                        trades
                            .slice()
                            .reverse()
                            .forEach((t) => {
                                let percent = parseFloat(
                                    t.result.replace("%", ""),
                                );
                                let profitStr =
                                    (percent > 0 ? "+" : "") +
                                    percent.toFixed(2) +
                                    "%";
                                const dirClass =
                                    t.direction === "LONG"
                                        ? "dir-long"
                                        : "dir-short";
                                const reasonClass =
                                    t.reason === "TP"
                                        ? "reason-tp"
                                        : "reason-sl";
                                const pnlClass =
                                    percent >= 0 ? "pnl-pos" : "pnl-neg";
                                const tr = document.createElement("tr");
                                tr.innerHTML = `
              <td class="time-cell">${t.time}</td>
              <td>${t.coin}</td>
              <td class="${dirClass}">${t.direction}</td>
              <td>${t.entry}</td>
              <td class="sl-cell">${t.sl}</td>
              <td class="tp-cell">${t.tp}</td>
              <td>${t.exit}</td>
              <td class="${reasonClass}">${t.reason}</td>
              <td class="${pnlClass}">${profitStr}</td>
              <td>${t.equity}</td>
            `;
                                tbody.appendChild(tr);
                            });
                    })
                    .catch(() => {
                        document.getElementById(statsBarId).innerHTML = "";
                        if (totalReturnBarId)
                            document.getElementById(
                                totalReturnBarId,
                            ).innerHTML = "";
                        document.querySelector(`#${tableId} tbody`).innerHTML =
                            '<tr><td colspan="10" style="color: #ef4444; padding: 20px;">CSV file not found</td></tr>';
                    });
            }

            function renderStatsBarTo(stats, id) {
                const bar = document.getElementById(id);
                if (!stats) {
                    bar.innerHTML = "";
                    return;
                }
                const lang = (
                    navigator.language ||
                    navigator.userLanguage ||
                    ""
                ).toLowerCase();
                const isTR = lang.startsWith("tr");
                const labels = isTR
                    ? {
                          sharpe: "Sharpe Ratio: Riske göre düzeltilmiş getiri oranı. Daha yüksek değer, daha iyi risk-ayarlı performans.",
                          win: "Win Rate: Kazanılan işlemlerin yüzdesi. Yüksek oran, daha fazla başarılı işlem demektir.",
                          rr: "Avg R:R: Ortalama Risk/Ödül oranı. 1'den büyükse, kazançlar kayıplardan daha büyüktür.",
                          dd: "Max Drawdown: En büyük sermaye düşüşü. Düşük olması daha iyidir.",
                          week: "Weekly Return: Son haftanın toplam net getirisi.",
                          month: "Monthly Return: Son ayın toplam net getirisi.",
                          n: "# of Trades: Toplam işlem sayısı.",
                      }
                    : {
                          sharpe: "Sharpe Ratio: Risk-adjusted return. Higher is better.",
                          win: "Win Rate: Percentage of winning trades. Higher means more successful trades.",
                          rr: "Avg R:R: Average Risk/Reward ratio. Above 1 means gains are larger than losses.",
                          dd: "Max Drawdown: Largest equity drop. Lower is better.",
                          week: "Weekly Return: Net return for the last week.",
                          month: "Monthly Return: Net return for the last month.",
                          n: "# of Trades: Total number of trades.",
                      };
                bar.innerHTML = `
        <div class="stat-box" data-info="${labels.sharpe}"><div class="stat-label">Sharpe Ratio</div><div class="stat-value stat-sharpe">${stats.sharpe}</div></div>
        <div class="stat-box" data-info="${labels.win}"><div class="stat-label">Win Rate</div><div class="stat-value stat-win">${stats.winRate}</div></div>
        <div class="stat-box" data-info="${labels.rr}"><div class="stat-label">Avg R:R</div><div class="stat-value stat-rr">${stats.avgRR}</div></div>
        <div class="stat-box" data-info="${labels.dd}"><div class="stat-label">Max Drawdown</div><div class="stat-value stat-dd">${stats.maxDraw}</div></div>
        <div class="stat-box" data-info="${labels.week}"><div class="stat-label">Weekly Return</div><div class="stat-value stat-week">${stats.weekNet}</div></div>
        <div class="stat-box" data-info="${labels.month}"><div class="stat-label">Monthly Return</div><div class="stat-value stat-month">${stats.monthNet}</div></div>
        <div class="stat-box" data-info="${labels.n}"><div class="stat-label"># of Trades</div><div class="stat-value stat-n">${stats.n}</div></div>
      `;
            }

            function loadAll() {
                loadTradesGeneric(
                    "foddsignal.csv",
                    "stats-bar",
                    "tradeTable",
                    "total-return-bar",
                );
                loadTradesGeneric(
                    "foddv2.csv",
                    "stats-bar-v2",
                    "tradeTable-v2",
                    "total-return-bar-v2",
                );
            }
            document.addEventListener("DOMContentLoaded", loadAll);
            setInterval(loadAll, 5000);
        </script>

        <style>

        <div id="info-popup" class="info-popup" style="display: none"></div>

        <script>
            // Info popup for stat-boxes
            document.addEventListener("DOMContentLoaded", function () {
                const popup = document.getElementById("info-popup");
                function showPopup(text, x, y) {
                    popup.textContent = text;
                    popup.style.display = "block";
                    popup.style.opacity = "0";
                    popup.style.pointerEvents = "auto";
                    // Ölçüm için önce görünür yap
                    popup.style.left = "0px";
                    popup.style.top = "0px";
                    // Genişlik ve yükseklik ölç
                    const popupRect = popup.getBoundingClientRect();
                    const winW = window.innerWidth;
                    const winH = window.innerHeight;
                    let left = x;
                    let top = y;
                    // Sağdan taşarsa sola kaydır
                    if (left + popupRect.width > winW - 8) {
                        left = winW - popupRect.width - 8;
                    }
                    // Soldan taşarsa sağa kaydır
                    if (left < 8) {
                        left = 8;
                    }
                    // Alttan taşarsa yukarı al
                    if (top + popupRect.height > winH - 8) {
                        top = y - popupRect.height - 24;
                    }
                    // Yukarıdan taşarsa aşağı al
                    if (top < 8) {
                        top = 8;
                    }
                    popup.style.left = left + "px";
                    popup.style.top = top + "px";
                    popup.style.opacity = "1";
                }
                function hidePopup() {
                    popup.style.opacity = "0";
                    popup.style.pointerEvents = "none";
                    popup.style.display = "none";
                }
                document.addEventListener("click", function (e) {
                    const statBox =
                        e.target.closest && e.target.closest(".stat-box");
                    if (statBox && statBox.dataset.info) {
                        const rect = statBox.getBoundingClientRect();
                        let x = rect.left + rect.width / 2 - 160; // Popup genişliğinin yarısı kadar sola kaydır
                        let y = rect.bottom + 12; // Kutunun hemen altında

                        // Eğer popup ekranın altından taşarsa, kutunun üstüne al
                        if (y + 100 > window.innerHeight) {
                            y = rect.top - 70;
                        }

                        showPopup(statBox.dataset.info, x, y);
                    } else {
                        hidePopup();
                    }
                });
                window.addEventListener("scroll", hidePopup);
                window.addEventListener("resize", hidePopup);
            });
        </script>
    </body>
